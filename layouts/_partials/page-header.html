{{- /*
  Standard page header band — the single source of truth for page H1 styling.
  Usage: partial "page-header.html" (dict "title" .Title "subtitle" "optional line")
*/ -}}
<div class="border-b border-slate-200 bg-brand-50">
  <div class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <h1 class="text-3xl font-bold tracking-tight text-brand-900 sm:text-4xl">{{ .title }}</h1>
    {{ with .subtitle }}<p class="mt-2 max-w-2xl text-slate-600">{{ . }}</p>{{ end }}
  </div>
</div>
