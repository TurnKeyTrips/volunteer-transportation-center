{{- /* "Next up" widget: the 5 soonest events from the calendar (or sample data). */ -}}
<div x-data="vtcUpcoming(5)" x-cloak x-show="!failed && (loading || events.length > 0)"
  class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="text-lg font-bold text-slate-900">Upcoming Events</h2>

  {{/* Loading skeleton */}}
  <div x-show="loading" class="mt-3 space-y-2" aria-hidden="true">
    <template x-for="i in 3">
      <div class="flex animate-pulse items-center gap-3">
        <div class="size-10 rounded-lg bg-slate-100"></div>
        <div class="flex-1 space-y-2">
          <div class="h-3 w-2/3 rounded bg-slate-100"></div>
          <div class="h-3 w-1/3 rounded bg-slate-100"></div>
        </div>
      </div>
    </template>
  </div>

  <ul x-show="!loading" class="mt-3 divide-y divide-slate-100">
    <template x-for="e in events" :key="e.id">
      <li class="flex items-center gap-3 py-2">
        <div class="flex size-10 shrink-0 flex-col items-center justify-center rounded-lg bg-brand-50 leading-none">
          <span class="text-[9px] font-bold uppercase tracking-wide text-brand-600" x-text="monthShort(e)"></span>
          <span class="mt-0.5 text-base font-extrabold text-brand-800" x-text="dayNum(e)"></span>
        </div>
        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-semibold text-slate-900" x-text="e.title"></p>
          <p class="truncate text-xs text-slate-500">
            <span x-text="when(e)"></span><span x-show="e.location"> · <span x-text="e.location"></span></span>
          </p>
        </div>
      </li>
    </template>
  </ul>
</div>
