{{- /*
  Small "Event: 7/18/26" pill shown wherever a post's event date appears
  (post cards, posts-page hero, home carousel, single post). Call inside a
  `with .Params.event_date` guard: partial "event-pill.html" .
*/ -}}
<span class="inline-flex items-center rounded-full bg-accent-100 px-2.5 py-0.5 text-xs font-semibold text-accent-800">
  Event: {{ (time .).Format "1/2/06" }}
</span>
