{{ define "main" }}
{{ partial "page-header.html" (dict "title" .Title "subtitle" .Params.subtitle) }}

<div class="mx-auto max-w-5xl px-4 py-12 sm:px-6 lg:px-8">

  {{/* Full-width video */}}
  <div class="aspect-video w-full overflow-hidden rounded-2xl shadow-lg">
    <iframe class="size-full" src="https://www.youtube-nocookie.com/embed/bXn1eE3vekY"
      title="Watch Our Story — Volunteer Transportation Center"
      allow="accelerometer; encrypted-media; picture-in-picture" allowfullscreen loading="lazy"></iframe>
  </div>

  {{/* Blurb */}}
  {{ with .Content }}
    <div class="prose prose-slate mx-auto mt-10 max-w-3xl prose-headings:tracking-tight prose-a:font-medium prose-a:text-brand-700 hover:prose-a:text-brand-500">{{ . }}</div>
  {{ end }}
</div>
{{ end }}
