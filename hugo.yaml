baseURL: https://volunteertransportationcenter.org/
locale: en-US
title: Volunteer Transportation Center
enableRobotsTXT: true
summaryLength: 30
timeZone: America/New_York
disableKinds:
  - taxonomy
  - term

# Site-wide facts (contact info, stats, links, mission) live in data/site.yaml.

markup:
  goldmark:
    renderer:
      unsafe: true

build:
  buildStats:
    enable: true
  cachebusters:
    - source: assets/notwatching/hugo_stats\.json
      target: css
    - source: (postcss|tailwind)\.config\.js
      target: css

module:
  mounts:
    - source: assets
      target: assets
    - source: hugo_stats.json
      target: assets/notwatching/hugo_stats.json
      disableWatch: true

