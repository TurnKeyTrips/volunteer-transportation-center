# Staff roster shown on the About Us page (edit THIS file — no HTML needed).
#
# To add a person:    copy a "- name: / title:" pair into the right section.
# To remove a person: delete their lines.
# To add a team:      copy a "- name: ... members:" block under "teams:".
# Photos (optional):  add "photo:" and "photo2:" paths per person, e.g.
#                       photo: /images/people/jane-doe.jpg
#                       photo2: /images/people/jane-doe-fun.jpg
#                     Put image files in assets/images/people/ — any size is
#                     fine (phone photos included); the build resizes them to
#                     small square thumbnails automatically. "photo" shows
#                     normally; "photo2" is revealed on hover. If omitted, a
#                     hand-drawn placeholder character is used (who waves and
#                     puts on neon glasses on hover).
# Blurb (optional):   blurb: One friendly sentence about this person.
#                     Shows under the name; a placeholder line appears if omitted.
#                     Emoji are fine and render upright (not italicized).
# Title 2 (optional): title_2: A fun alternate job title revealed on hover.
#                     Ignored when omitted.
# Changes appear on /about-us/ on the next build.
