# Forms listed on the /forms/ page, grouped into sections.
# To add a form: copy a "- name/url/type" block into the right section
# (links are sorted alphabetically at build time, so order here doesn't matter).
#   type: online  = web form filled out in the browser
#   type: pdf     = downloadable/printable file
#   type: image   = downloadable image
#   type: link    = a regular page or external website
# "note" on a section shows as an amber county-restriction callout.
# "column: right" places a section in the right-hand column on desktop.
